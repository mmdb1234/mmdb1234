<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600">
  <foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mohammad Barzgar · Backend Engineer</title>

    <!-- Font Awesome Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
        /* ---------- reset & base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* ---------- main card ---------- */
        .banner {
            max-width: 1200px;
            width: 100%;
            background: linear-gradient(145deg, #11161f, #0b0e14);
            border-radius: 48px;
            padding: 52px 56px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        .banner:hover {
            box-shadow: 0 40px 100px rgba(0, 20, 80, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        /* ---------- animated gradient orb (background) ---------- */
        .orb {
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.12) 0%, rgba(0, 200, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(100px);
            animation: orbFloat 16s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        .orb2 {
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.10) 0%, rgba(120, 80, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(120px);
            animation: orbFloat2 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-40px, 30px) scale(1.1);
            }
            100% {
                transform: translate(20px, -20px) scale(0.95);
            }
        }

        @keyframes orbFloat2 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -40px) scale(1.15);
            }
            100% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* ---------- content (above background) ---------- */
        .banner-content {
            position: relative;
            z-index: 2;
        }

        /* ---------- top row: avatar + badge ---------- */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }

        .avatar-group {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e2a3a, #0f1620);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            color: #c0d0e0;
            border: 2px solid rgba(0, 180, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.15);
            transition: 0.3s;
        }

        .avatar:hover {
            border-color: #00b4ff;
            box-shadow: 0 0 50px rgba(0, 180, 255, 0.3);
            transform: scale(1.04);
        }

        .name-title h1 {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .name-title .badge {
            display: inline-block;
            margin-top: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #8ab4f8;
            background: rgba(0, 180, 255, 0.10);
            padding: 4px 16px;
            border-radius: 100px;
            border: 1px solid rgba(0, 180, 255, 0.15);
            backdrop-filter: blur(4px);
        }

        .status-pulse {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 180, 0.06);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(0, 255, 180, 0.15);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00f5a0;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(0, 245, 160, 0.4);
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
            100% {
                opacity: 0.4;
                transform: scale(0.9);
            }
        }

        .status-pulse span {
            color: #b0d0e0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ---------- tagline ---------- */
        .tagline {
            font-size: 20px;
            font-weight: 400;
            color: #b8c8dd;
            margin-bottom: 28px;
            line-height: 1.5;
            max-width: 700px;
        }

        .tagline strong {
            color: #ffffff;
            font-weight: 600;
            background: linear-gradient(135deg, #00b4ff, #7b61ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ---------- animated tech strip ---------- */
        .tech-strip {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 36px;
            overflow: hidden;
        }

        .tech-strip-inner {
            display: flex;
            gap: 32px;
            animation: scrollTech 18s linear infinite;
            white-space: nowrap;
            width: max-content;
        }

        .tech-strip-inner span {
            color: #7a8fa3;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tech-strip-inner span i {
            color: #00b4ff;
            font-size: 16px;
        }

        @keyframes scrollTech {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        /* ---------- stats / highlights ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
            transition: 0.25s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 180, 255, 0.12);
            transform: translateY(-2px);
        }

        .stat-item .number {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .stat-item .number .accent {
            color: #00b4ff;
        }

        .stat-item .label {
            font-size: 14px;
            color: #7a8fa3;
            margin-top: 4px;
        }

        /* ---------- CTA buttons ---------- */
        .cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: 0.25s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0077ff, #5a3fff);
            color: #ffffff;
            box-shadow: 0 8px 30px rgba(0, 100, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 100, 255, 0.35);
        }

        .btn-outline {
            background: transparent;
            color: #c0d0e0;
            border: 1px solid rgba(255, 255, 255, 0.10);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.20);
            transform: translateY(-3px);
        }

        .btn i {
            font-size: 18px;
        }

        /* ---------- responsive ---------- */
        @media (max-width: 720px) {
            .banner {
                padding: 32px 24px;
                border-radius: 32px;
            }

            .top-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .status-pulse {
                align-self: flex-start;
            }

            .name-title h1 {
                font-size: 26px;
            }

            .tagline {
                font-size: 17px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .cta-row {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                justify-content: center;
            }

            .tech-strip {
                padding: 10px 14px;
            }
        }

        @media (max-width: 440px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="banner">

        <!-- Animated background orbs -->
        <div class="orb"></div>
        <div class="orb2"></div>

        <div class="banner-content">

            <!-- top row: avatar + status -->
            <div class="top-row">
                <div class="avatar-group">
                    <div class="avatar">MB</div>
                    <div class="name-title">
                        <h1>Mohammad Barzgar</h1>
                        <div class="badge">
                            <i class="fas fa-code" style="margin-right:6px;"></i>
                            Backend · AI · SaaS
                        </div>
                    </div>
                </div>
                <div class="status-pulse">
                    <span class="pulse-dot"></span>
                    <span>Open to work</span>
                </div>
            </div>

            <!-- tagline -->
            <div class="tagline">
                I help startups build <strong>scalable backends</strong> &amp;
                <strong>AI-powered business automation</strong> — from MVP to production.
            </div>

            <!-- animated tech strip -->
            <div class="tech-strip">
                <div class="tech-strip-inner">
                    <span><i class="fas fa-cube"></i> ASP.NET Core</span>
                    <span><i class="fab fa-python"></i> Python · FastAPI</span>
                    <span><i class="fas fa-database"></i> PostgreSQL · Redis</span>
                    <span><i class="fas fa-cloud"></i> Docker · Linux</span>
                    <span><i class="fas fa-brain"></i> AI Agents · LLMs</span>
                    <span><i class="fas fa-cogs"></i> n8n · Automation</span>
                    <span><i class="fas fa-code"></i> React · Next.js</span>
                    <span><i class="fas fa-cube"></i> ASP.NET Core</span>
                    <span><i class="fab fa-python"></i> Python · FastAPI</span>
                    <span><i class="fas fa-database"></i> PostgreSQL · Redis</span>
                    <span><i class="fas fa-cloud"></i> Docker · Linux</span>
                    <span><i class="fas fa-brain"></i> AI Agents · LLMs</span>
                    <span><i class="fas fa-cogs"></i> n8n · Automation</span>
                    <span><i class="fas fa-code"></i> React · Next.js</span>
                </div>
            </div>

            <!-- stats -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="number">7<span class="accent">+</span></div>
                    <div class="label">Years Backend Experience</div>
                </div>
                <div class="stat-item">
                    <div class="number">10<span class="accent">d</span></div>
                    <div class="label">MVP to Production</div>
                </div>
                <div class="stat-item">
                    <div class="number">3<span class="accent">+</span></div>
                    <div class="label">Startups Scaled</div>
                </div>
                <div class="stat-item">
                    <div class="number">100<span class="accent">%</span></div>
                    <div class="label">Remote Friendly</div>
                </div>
            </div>

            <!-- CTA -->
            <div class="cta-row">
                <a href="https://linkedin.com/in/mohammad-barzgar-899476307" target="_blank" class="btn btn-primary">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="mailto:mohjammad200@gmail.com" class="btn btn-outline">
                    <i class="fas fa-envelope"></i> Email
                </a>
                <a href="#" class="btn btn-outline" style="border-color:rgba(0,180,255,0.15);">
                    <i class="fas fa-file-alt"></i> View CV
                </a>
            </div>

        </div>
        <!-- /banner-content -->
    </div>
</div>
  </foreignObject>
</svg>
    <!-- /banner -->

</body>
</html>
