<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <style>
      .bg { fill: #0b0e14; }
      .banner-bg { fill: #11161f; rx: 48; }
      .text-white { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .text-gray { fill: #b8c8dd; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .text-dark { fill: #7a8fa3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .badge-bg { fill: rgba(0,180,255,0.10); stroke: rgba(0,180,255,0.15); rx: 100; }
      .badge-text { fill: #8ab4f8; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .btn-primary-bg { fill: url(#btnGrad); rx: 60; }
      .btn-outline-bg { fill: transparent; stroke: rgba(255,255,255,0.10); rx: 60; }
      .btn-outline-blue { fill: transparent; stroke: rgba(0,180,255,0.15); rx: 60; }
      .btn-text { fill: #ffffff; font-size: 15px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .btn-text-outline { fill: #c0d0e0; font-size: 15px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .stat-bg { fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.03); rx: 20; }
      .stat-number { fill: #ffffff; font-size: 28px; font-weight: 700; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .stat-label { fill: #7a8fa3; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .tech-bg { fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.04); rx: 60; }
      .tech-text { fill: #7a8fa3; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .accent { fill: #00b4ff; }
      .avatar-bg { fill: #1e2a3a; stroke: rgba(0,180,255,0.3); stroke-width: 2; }
      .avatar-text { fill: #c0d0e0; font-size: 32px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .status-bg { fill: rgba(0,255,180,0.06); stroke: rgba(0,255,180,0.15); rx: 100; }
      .status-text { fill: #b0d0e0; font-size: 14px; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
    
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077ff" />
      <stop offset="100%" style="stop-color:#5a3fff" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4ff" />
      <stop offset="100%" style="stop-color:#7b61ff" />
    </linearGradient>
  </defs>
  
  <!-- پس‌زمینه -->
  <rect class="bg" width="1200" height="600"/>
  <rect class="banner-bg" x="20" y="20" width="1160" height="560"/>
  
  <!-- توپ‌های نوری متحرک -->
  <circle cx="900" cy="100" r="300" fill="rgba(0,200,255,0.06)" filter="blur(80px)">
    <animate attributeName="cx" values="900;860;920;900" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;130;80;100" dur="16s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="500" r="250" fill="rgba(120,80,255,0.05)" filter="blur(80px)">
    <animate attributeName="cx" values="200;230;170;200" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="500;460;540;500" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <!-- آواتار -->
  <circle class="avatar-bg" cx="85" cy="85" r="36"/>
  <text class="avatar-text" x="85" y="95" text-anchor="middle">MB</text>
  
  <!-- نام -->
  <text class="text-white" x="140" y="80" font-size="32" font-weight="700">Mohammad Barzgar</text>
  
  <!-- Badge -->
  <rect class="badge-bg" x="140" y="95" width="155" height="30"/>
  <text class="badge-text" x="155" y="114">⚡ Backend · AI · SaaS</text>
  
  <!-- Status Pulse -->
  <rect class="status-bg" x="900" y="70" width="145" height="36"/>
  <circle cx="918" cy="88" r="6" fill="#00f5a0">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text class="status-text" x="935" y="93">Open to work</text>
  
  <!-- Tagline -->
  <text class="text-gray" x="50" y="175" font-size="20">I help startups build scalable backends &amp;</text>
  <text class="text-gray" x="50" y="205" font-size="20">AI-powered business automation — from MVP to production.</text>
  
  <!-- Tech Strip -->
  <rect class="tech-bg" x="50" y="245" width="1100" height="50"/>
  <g>
    <animateTransform attributeName="transform" type="translate" from="0" to="-550" dur="18s" repeatCount="indefinite"/>
    <text class="tech-text" x="70" y="275">⚙️ ASP.NET Core</text>
    <text class="tech-text" x="200" y="275">🐍 Python · FastAPI</text>
    <text class="tech-text" x="350" y="275">🗄️ PostgreSQL · Redis</text>
    <text class="tech-text" x="530" y="275">☁️ Docker · Linux</text>
    <text class="tech-text" x="680" y="275">🧠 AI Agents · LLMs</text>
    <text class="tech-text" x="830" y="275">⚡ n8n · Automation</text>
    <text class="tech-text" x="980" y="275">🖥️ React · Next.js</text>
    <!-- تکرار برای اسکرول -->
    <text class="tech-text" x="1130" y="275">⚙️ ASP.NET Core</text>
    <text class="tech-text" x="1260" y="275">🐍 Python · FastAPI</text>
    <text class="tech-text" x="1410" y="275">🗄️ PostgreSQL · Redis</text>
    <text class="tech-text" x="1590" y="275">☁️ Docker · Linux</text>
    <text class="tech-text" x="1740" y="275">🧠 AI Agents · LLMs</text>
    <text class="tech-text" x="1890" y="275">⚡ n8n · Automation</text>
    <text class="tech-text" x="2040" y="275">🖥️ React · Next.js</text>
  </g>
  
  <!-- Stats -->
  <!-- Stat 1 -->
  <rect class="stat-bg" x="50" y="330" width="260" height="80"/>
  <text class="stat-number" x="180" y="370" text-anchor="middle">5<tspan class="accent">+</tspan></text>
  <text class="stat-label" x="180" y="395" text-anchor="middle">Years Backend Experience</text>
  
  <!-- Stat 2 -->
  <rect class="stat-bg" x="330" y="330" width="260" height="80"/>
  <text class="stat-number" x="460" y="370" text-anchor="middle">10<tspan class="accent">d</tspan></text>
  <text class="stat-label" x="460" y="395" text-anchor="middle">MVP to Production</text>
  
  <!-- Stat 3 -->
  <rect class="stat-bg" x="610" y="330" width="260" height="80"/>
  <text class="stat-number" x="740" y="370" text-anchor="middle">3<tspan class="accent">+</tspan></text>
  <text class="stat-label" x="740" y="395" text-anchor="middle">Startups Scaled</text>
  
  <!-- Stat 4 -->
  <rect class="stat-bg" x="890" y="330" width="260" height="80"/>
  <text class="stat-number" x="1020" y="370" text-anchor="middle">100<tspan class="accent">%</tspan></text>
  <text class="stat-label" x="1020" y="395" text-anchor="middle">Remote Friendly</text>
  
  <!-- CTA Buttons -->
  <!-- LinkedIn -->
  <a href="https://linkedin.com/in/mohammad-barzgar-899476307" target="_blank">
    <rect class="btn-primary-bg" x="50" y="450" width="200" height="50"/>
    <text class="btn-text" x="150" y="480" text-anchor="middle">🔗 LinkedIn</text>
  </a>
  
  <!-- Email -->
  <a href="mailto:mohjammad200@gmail.com">
    <rect class="btn-outline-bg" x="270" y="450" width="200" height="50"/>
    <text class="btn-text-outline" x="370" y="480" text-anchor="middle">📧 Email</text>
  </a>
  
  <!-- CV -->
  <a href="#">
    <rect class="btn-outline-blue" x="490" y="450" width="200" height="50"/>
    <text class="btn-text-outline" x="590" y="480" text-anchor="middle">📄 View CV</text>
  </a>
</svg>
